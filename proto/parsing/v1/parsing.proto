syntax = "proto3";

package parsing.v1;

option go_package = "skinbaron-analyzer/proto/parsing/v1;parsingv1";

import "google/protobuf/timestamp.proto";

service ParsingService {
  rpc ListOffers(ListOffersRequest) returns (ListOffersResponse);

  rpc ListItemSalesStats(ListItemSalesStatsRequest) returns (ListItemSalesStatsResponse);
  rpc ListItemSales(ListItemSalesRequest) returns (ListItemSalesResponse);
}

message ListOffersRequest {
  int64 limit = 1;
  int64 offset = 2;
  optional int64 state = 3;
  optional int64 app_id = 4;
  optional string name_query = 5;
  optional double min_price = 6;
  optional double max_price = 7;
  optional google.protobuf.Timestamp list_time = 8;
  optional google.protobuf.Timestamp last_updated = 9;
  optional string sort_by = 10;
  optional string sort_order = 11;
}

message Offer {
  string id = 1;
  double price = 2;
  double commission = 3;
  double tax = 4;
  string class_id = 5;
  string instance_id = 6;
  int64 app_id = 7;
  string context_id = 8;
  string asset_id = 9;
  string name = 10;
  string offer_id = 11;
  int64 state = 12;
  google.protobuf.Timestamp escrow_end_date = 13;
  google.protobuf.Timestamp list_time = 14;
  google.protobuf.Timestamp last_updated = 15;
  double wear = 16;
  string txid = 17;
  bool trade_locked = 18;
  repeated string addons = 19;
  string buyer_country_code = 20;
}

message ListOffersResponse {
  repeated Offer items = 1;
  int64 total = 2;
  int64 limit = 3;
  int64 offset = 4;
}

message ListItemSalesStatsRequest {
  int64 limit = 1;
  int64 offset = 2;
  optional string item_name_query = 3;
  optional string wear_name = 4;
  optional double min_price = 5;
  optional double max_price = 6;
  optional string sold_from = 7;
  optional string sold_to = 8;
  optional int64 min_sales_count = 9;
}

message ItemSalesStats {
  string item_id = 1;
  string item_name = 2;
  int64 item_wear_id = 3;
  string wear_name = 4;
  int64 sales_count = 5;
  double avg_price = 6;
  double median_price = 7;
  double min_price = 8;
  double max_price = 9;
  repeated double sold_prices = 10;
  string first_sold_on = 11;
  string last_sold_on = 12;
}

message ListItemSalesStatsResponse {
  repeated ItemSalesStats items = 1;
  int64 limit = 2;
  int64 offset = 3;
}

message ListItemSalesRequest {
  int64 limit = 1;
  int64 offset = 2;
  optional string item_name_query = 3;
  optional string wear_name = 4;
  optional int64 item_wear_id = 5;
  optional double min_price = 6;
  optional double max_price = 7;
  optional string sold_from = 8;
  optional string sold_to = 9;
}

message ItemSale {
  string item_name = 1;
  string wear_name = 2;
  double price = 3;
  double wear_value = 4;
  string sold_on = 5;
}

message ListItemSalesResponse {
  repeated ItemSale items = 1;
  int64 limit = 2;
  int64 offset = 3;
}
