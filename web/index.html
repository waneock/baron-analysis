<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f7f7f7;
      color: #222;
    }

    h1 {
      margin-bottom: 16px;
    }

    .card {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(180px, 1fr));
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input, select, button {
      padding: 8px 10px;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      cursor: pointer;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
    }

    button:hover {
      background: #f0f0f0;
    }

    .meta {
      display: flex;
      gap: 16px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .status {
      margin-bottom: 12px;
      font-size: 14px;
    }

    .error {
      color: #b00020;
      font-weight: 600;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px 10px;
      text-align: left;
      font-size: 14px;
      white-space: nowrap;
    }

    th {
      background: #f1f1f1;
    }

    .pagination {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      align-items: center;
    }

    @media (max-width: 1100px) {
      .filters {
        grid-template-columns: repeat(2, minmax(180px, 1fr));
      }
    }

    @media (max-width: 700px) {
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Offers</h1>

  <div class="card">
    <form id="filters-form">
      <div class="filters">
        <div class="field">
          <label for="limit">Limit</label>
          <input id="limit" name="limit" type="number" value="50" min="1" />
        </div>

        <div class="field">
          <label for="offset">Offset</label>
          <input id="offset" name="offset" type="number" value="0" min="0" />
        </div>

        <div class="field">
          <label for="app_id">App ID</label>
          <input id="app_id" name="app_id" type="number" placeholder="730" />
        </div>

        <div class="field">
          <label for="state">State</label>
          <input id="state" name="state" type="number" placeholder="2" />
        </div>

        <div class="field">
          <label for="name_query">Name query</label>
          <input id="name_query" name="name_query" type="text" placeholder="AK-47" />
        </div>

        <div class="field">
          <label for="min_price">Min price</label>
          <input id="min_price" name="min_price" type="number" step="0.01" />
        </div>

        <div class="field">
          <label for="max_price">Max price</label>
          <input id="max_price" name="max_price" type="number" step="0.01" />
        </div>

        <div class="field">
          <label for="list_time">List time</label>
          <input id="list_time" name="list_time" type="datetime-local" />
        </div>

        <div class="field">
          <label for="last_updated">Last updated</label>
          <input id="last_updated" name="last_updated" type="datetime-local" />
        </div>

        <div class="field">
          <label for="sort_by">Sort by</label>
          <select id="sort_by" name="sort_by">
            <option value="">-- select --</option>
            <option value="price">price</option>
            <option value="name">name</option>
            <option value="state">state</option>
            <option value="list_time">list_time</option>
            <option value="last_updated">last_updated</option>
          </select>
        </div>

        <div class="field">
          <label for="sort_order">Sort order</label>
          <select id="sort_order" name="sort_order">
            <option value="">-- select --</option>
            <option value="asc">asc</option>
            <option value="desc">desc</option>
          </select>
        </div>
      </div>

      <div class="actions">
        <button type="submit">Search</button>
        <button type="button" id="reset-btn">Reset</button>
      </div>
    </form>
  </div>

  <div class="card">
    <div class="meta">
      <div><strong>Total:</strong> <span id="total">0</span></div>
      <div><strong>Limit:</strong> <span id="meta-limit">0</span></div>
      <div><strong>Offset:</strong> <span id="meta-offset">0</span></div>
    </div>

    <div id="status" class="status"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Commission</th>
            <th>Tax</th>
            <th>App ID</th>
            <th>State</th>
            <th>Wear</th>
            <th>List Time</th>
            <th>Last Updated</th>
            <th>Buyer Country</th>
          </tr>
        </thead>
        <tbody id="offers-body">
          <tr>
            <td colspan="11">No data</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button type="button" id="prev-btn">Prev</button>
      <button type="button" id="next-btn">Next</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("filters-form");
    const resetBtn = document.getElementById("reset-btn");
    const prevBtn = document.getElementById("prev-btn");
    const nextBtn = document.getElementById("next-btn");
    const offersBody = document.getElementById("offers-body");
    const statusEl = document.getElementById("status");
    const totalEl = document.getElementById("total");
    const metaLimitEl = document.getElementById("meta-limit");
    const metaOffsetEl = document.getElementById("meta-offset");

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.className = isError ? "status error" : "status";
    }

    function buildQueryString() {
      const formData = new FormData(form);
      const params = new URLSearchParams();

      for (const [key, value] of formData.entries()) {
        if (value === "") continue;

        if (key === "list_time" || key === "last_updated") {
          const d = new Date(value);
          if (!isNaN(d.getTime())) {
            params.set(key, d.toISOString());
          }
          continue;
        }

        params.set(key, value);
      }

      return params.toString();
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderRows(items) {
      if (!items || items.length === 0) {
        offersBody.innerHTML = `
          <tr>
            <td colspan="11">No data</td>
          </tr>
        `;
        return;
      }

      offersBody.innerHTML = items.map(item => `
        <tr>
          <td>${escapeHtml(item.id)}</td>
          <td>${escapeHtml(item.name)}</td>
          <td>${escapeHtml(item.price)}</td>
          <td>${escapeHtml(item.commission)}</td>
          <td>${escapeHtml(item.tax)}</td>
          <td>${escapeHtml(item.app_id)}</td>
          <td>${escapeHtml(item.state)}</td>
          <td>${escapeHtml(item.wear)}</td>
          <td>${escapeHtml(item.list_time)}</td>
          <td>${escapeHtml(item.last_updated)}</td>
          <td>${escapeHtml(item.buyer_country_code)}</td>
        </tr>
      `).join("");
    }

    async function fetchOffers() {
      try {
        setStatus("Loading...");
        offersBody.innerHTML = `
          <tr>
            <td colspan="11">Loading...</td>
          </tr>
        `;

        const query = buildQueryString();
        const res = await fetch(`/v1/offers/list?${query}`, {
          method: "GET",
          headers: {
            "Accept": "application/json"
          }
        });

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text || `HTTP ${res.status}`);
        }

        const data = await res.json();

        totalEl.textContent = data.total ?? 0;
        metaLimitEl.textContent = data.limit ?? 0;
        metaOffsetEl.textContent = data.offset ?? 0;

        renderRows(data.items || []);
        setStatus(`Loaded ${data.items?.length || 0} rows`);
      } catch (err) {
        console.error(err);
        renderRows([]);
        setStatus(`Request failed: ${err.message}`, true);
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const offsetInput = document.getElementById("offset");
      offsetInput.value = "0";

      await fetchOffers();
    });

    resetBtn.addEventListener("click", async () => {
      form.reset();
      document.getElementById("limit").value = "50";
      document.getElementById("offset").value = "0";
      await fetchOffers();
    });

    prevBtn.addEventListener("click", async () => {
      const limit = Number(document.getElementById("limit").value || 50);
      const offsetInput = document.getElementById("offset");
      const currentOffset = Number(offsetInput.value || 0);
      offsetInput.value = String(Math.max(0, currentOffset - limit));
      await fetchOffers();
    });

    nextBtn.addEventListener("click", async () => {
      const limit = Number(document.getElementById("limit").value || 50);
      const offsetInput = document.getElementById("offset");
      const currentOffset = Number(offsetInput.value || 0);
      offsetInput.value = String(currentOffset + limit);
      await fetchOffers();
    });

    fetchOffers();
  </script>
</body>
</html>
